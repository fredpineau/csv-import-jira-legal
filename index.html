<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Import for Jira Select Fields</title>
  <meta name="description" content="Legal and support pages for CSV Import for Jira Select Fields." />
  <style>
    :root {
      --bg: #f7f8f9;
      --card: #ffffff;
      --text: #172b4d;
      --muted: #5e6c84;
      --primary: #0c66e4;
      --border: #dfe1e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 1px 2px rgba(9,30,66,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      line-height: 1.6;
      color: var(--muted);
    }
    .links {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }
    a.link {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      background: #fff;
    }
    a.link:hover {
      border-color: var(--primary);
    }
    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>CSV Import for Jira Select Fields</h1>
      <p>
        Official legal and support pages for the Atlassian Marketplace app
        <strong>CSV Import for Jira Select Fields</strong>.
      </p>

      <div class="links">
        <a class="link" href="./privacy.html">Privacy Policy</a>
        <a class="link" href="./terms.html">Terms of Use</a>
        <a class="link" href="./support.html">Support</a>
      </div>

      <div class="footer">
        This app runs on Atlassian Forge.
      </div>
    </section>
  </main>
</body>
</html>
